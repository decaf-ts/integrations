services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
    ports:
      - "15433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - e2e

  redis:
    image: redis:7-alpine
    ports:
      - "16380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - e2e

  superset:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SUPERSET_GIT_URL: https://github.com/apache/superset.git
        SUPERSET_GIT_REF: "6.1.0"
    environment:
      - SUPERSET_CONFIG_PATH=/app/superset_config.py
      - SUPERSET_GUEST_TOKEN_JWT_SECRET=e2e-test-secret-at-least-32-chars-long
      - DATABASE_URL=postgresql+psycopg2://superset:superset@postgres:5432/superset
      - REDIS_URL=redis://redis:6379/0
      - SUPERSET_SECRET_KEY=e2e-test-secret-key-for-flask
      - TALISMAN_ENABLED=false
    ports:
      - "8089:8088"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8088/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s
    networks:
      - e2e

networks:
  e2e:
    driver: bridge
