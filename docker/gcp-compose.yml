services:
  gcp-emulator:
    image: ghcr.io/blackwell-systems/gcp-secret-manager-emulator-dual:latest
    container_name: gcp-emulator
    restart: unless-stopped
    environment:
      - GCP_MOCK_LOG_LEVEL=info
    ports:
      - "8080:8080"
      - "9091:9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/v1/projects/healthcheck/secrets"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
