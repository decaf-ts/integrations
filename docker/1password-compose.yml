version: "3.8"

services:
  1password:
    image: none
    build:
      context: .
      dockerfile: Dockerfile.1password
    container_name: 1password-cli
    restart: unless-stopped
    volumes:
      - op-data:/home/op/.1password
    environment:
      - OP_ACCOUNT_ID=
      - OP_SESSION=
    healthcheck:
      test: ["CMD", "op", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  op-data:
