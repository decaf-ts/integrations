services:
  # MinIO - S3-compatible object storage (covers s3, minio, and r2 blob providers)
  minio:
    image: minio/minio:RELEASE.2024-08-29T01-40-52Z
    container_name: minio-blob-integration
    restart: unless-stopped
    command: server /data --console-address ":9101"
    ports:
      - "9100:9000"
      - "9101:9101"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-blob-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  minio-blob-data:
    name: minio-blob-data
